<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24372d">
  <meta name="description" content="注目イベントによる客足への影響を確認し、勤務後の実感を記録します。">
  <title>イベント情報・集客記録</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=20260702-6">
</head>
<body>
  <main class="shell">
    <div class="menu-overlay" hidden></div>
    <nav class="site-nav" aria-label="メインメニュー">
      <button class="menu-close" type="button" aria-label="メニューを閉じる">×</button>
      <a class="is-current" href="./">ホーム</a>
      <a href="./records.html">記録一覧</a>
      <a href="#record-form">新規記録</a>
      <button id="nav-auth-button" type="button">ログイン</button>
    </nav>
    <header class="hero app-header">
      <div class="brand-title"><p class="eyebrow">CUSTOMER FLOW NOTE</p><h1>イベント情報・集客記録</h1><p class="hero-description">イベント情報と集客記録をひとつの画面で管理できます。</p></div>
      <button class="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false"><span></span><span></span><span></span></button>
    </header>

    <section class="date-row" aria-label="記録日">
      <label for="record-date">記録日</label>
      <input id="record-date" type="date">
      <button id="today-button" class="today-button" type="button">今日</button>
    </section>

    <section class="panel event-panel" aria-labelledby="event-title">
      <div class="section-heading">
        <div>
          <p class="section-kicker">TODAY'S SIGNAL</p>
          <h2 id="event-title">今日の注目イベント</h2>
        </div>
        <span id="event-count" class="count-pill">確認中</span>
      </div>
      <div id="events" class="event-list" aria-live="polite"></div>
    </section>

    <section class="panel week-panel" aria-labelledby="week-title">
      <div class="section-heading">
        <div>
          <p class="section-kicker">NEXT 7 DAYS</p>
          <h2 id="week-title">1週間のイベント予定</h2>
        </div>
        <span id="week-count" class="count-pill">確認中</span>
      </div>
      <div id="week-schedule" class="week-list" aria-live="polite"></div>
    </section>

    <form id="record-form" class="panel record-panel">
      <div class="section-heading">
        <div>
          <p class="section-kicker">AFTER WORK</p>
          <h2>勤務後の集客記録</h2>
        </div>
      </div>

      <div id="auth-panel" class="auth-panel" hidden>
        <div>
          <strong id="auth-title">記録するにはGoogleログインが必要です</strong>
          <p id="auth-message">イベント予定はログインなしで確認できます。</p>
        </div>
        <div class="auth-actions">
          <button id="login-button" class="auth-button" type="button">Googleでログイン</button>
          <button id="logout-button" class="auth-button secondary" type="button" hidden>ログアウト</button>
        </div>
      </div>

      <div id="record-context" class="record-context" role="status" aria-live="polite"></div>

      <div id="related-events" class="related-events" hidden></div>

      <fieldset>
        <legend>今日の客足 <span>必須</span></legend>
        <div class="choice-grid three">
          <label class="choice"><input type="radio" name="traffic" value="暇" required><span>暇</span></label>
          <label class="choice"><input type="radio" name="traffic" value="通常"><span>通常</span></label>
          <label class="choice"><input type="radio" name="traffic" value="混雑"><span>混雑</span></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>天気</legend>
        <div class="choice-grid weather">
          <label class="choice"><input type="radio" name="weather" value="晴れ"><span>晴れ</span></label>
          <label class="choice"><input type="radio" name="weather" value="曇り"><span>曇り</span></label>
          <label class="choice"><input type="radio" name="weather" value="雨"><span>雨</span></label>
          <label class="choice"><input type="radio" name="weather" value="荒天"><span>荒天</span></label>
          <label class="choice"><input type="radio" name="weather" value="不明"><span>不明</span></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>特に暇だった時間</legend>
        <div class="choice-grid periods">
          <label class="choice"><input type="checkbox" name="period" value="午前"><span>午前</span></label>
          <label class="choice"><input type="checkbox" name="period" value="昼"><span>昼</span></label>
          <label class="choice"><input type="checkbox" name="period" value="夕方"><span>夕方</span></label>
          <label class="choice"><input type="checkbox" name="period" value="終日"><span>終日</span></label>
          <label class="choice"><input type="checkbox" name="period" value="特になし"><span>特になし</span></label>
        </div>
      </fieldset>

      <div class="time-grid">
        <label>影響を感じた開始時刻<input id="impact-start" type="time"></label>
        <label>落ち着いた時刻<input id="impact-end" type="time"></label>
      </div>

      <fieldset id="event-impact-fieldset" hidden>
        <legend>イベントによる客足への影響</legend>
        <div class="choice-grid three">
          <label class="choice"><input type="radio" name="eventImpact" value="感じた"><span>感じた</span></label>
          <label class="choice"><input type="radio" name="eventImpact" value="感じなかった"><span>感じなかった</span></label>
          <label class="choice"><input type="radio" name="eventImpact" value="わからない"><span>わからない</span></label>
        </div>
      </fieldset>

      <fieldset id="accuracy-fieldset">
        <legend>事前予測はどうだった？</legend>
        <div class="choice-grid accuracy">
          <label class="choice"><input type="radio" name="accuracy" value="予測どおり"><span>予測どおり</span></label>
          <label class="choice"><input type="radio" name="accuracy" value="一部当たった"><span>一部当たった</span></label>
          <label class="choice"><input type="radio" name="accuracy" value="外れた"><span>外れた</span></label>
          <label class="choice"><input type="radio" name="accuracy" value="未判断"><span>未判断</span></label>
        </div>
      </fieldset>

      <label class="note-label" for="note">メモ <span id="note-count">0 / 600</span></label>
      <textarea id="note" maxlength="600" rows="4" placeholder="例：17時以降、店内・館内ともに閑散としていた。お客様の話題にも上がらなかった。"></textarea>

      <button id="save-button" class="save-button" type="submit">今日の記録を保存</button>
      <p id="save-status" class="save-status" role="status" aria-live="polite"></p>
    </form>
  </main>
  <div id="save-actions" class="save-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="save-modal-title" hidden>
    <div class="save-modal">
      <h2 id="save-modal-title">保存しました</h2>
      <p>保存した記録の詳細を確認しますか？</p>
      <div class="save-modal-actions">
        <a id="detail-link" class="action-link primary" href="./record.html">詳細を見る</a>
        <button id="continue-button" class="action-link" type="button">続けて別の日を記録する</button>
      </div>
    </div>
  </div>
  <script src="./menu.js?v=20260702-6" defer></script>
  <script src="./firebase-config.js"></script>
  <script src="./app.js?v=20260702-6" defer></script>
</body>
</html>
