<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24372d">
  <title>記録一覧｜客足イベントノート</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css?v=20260702-7">
</head>
<body>
  <main class="shell">
    <div class="menu-overlay" hidden></div>
    <nav class="site-nav" aria-label="メインメニュー">
      <button class="menu-close" type="button" aria-label="メニューを閉じる">×</button>
      <a href="./">ホーム</a><a class="is-current" href="./records.html">記録一覧</a><a href="./#record-form">新規記録</a><button id="nav-auth-button" type="button">ログイン</button>
    </nav>
    <header class="hero app-header"><div class="brand-title"><p class="eyebrow">RECORDS</p><h1>記録一覧</h1></div><button class="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false"><span></span><span></span><span></span></button></header>
    <p class="hero-description">保存した客足記録を日付順に確認できます。</p>
    <section class="panel">
      <div id="records-auth" class="auth-panel"><div><strong>Googleログインが必要です</strong><p>記録は本人だけが閲覧できます。</p></div><div class="auth-actions"><button id="login-button" class="auth-button" type="button">Googleでログイン</button></div></div>
      <div id="records-list" class="records-list"><p class="empty-state">確認しています…</p></div>
    </section>
  </main>
  <div id="delete-modal" class="save-modal-overlay delete-modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title" hidden>
    <div class="save-modal">
      <h2 id="delete-modal-title">記録を削除しますか？</h2>
      <p><span id="delete-target-date"></span> の記録を削除します。この操作は取り消せません。</p>
      <div class="save-modal-actions">
        <button id="cancel-delete-button" class="action-link" type="button">キャンセル</button>
        <button id="confirm-delete-button" class="action-link danger" type="button">削除する</button>
      </div>
    </div>
  </div>
  <script src="./menu.js?v=20260702-7" defer></script><script src="./firebase-config.js?v=20260702-7"></script><script src="./records-backend.js?v=20260702-7"></script><script src="./records.js?v=20260702-7" defer></script>
</body>
</html>
